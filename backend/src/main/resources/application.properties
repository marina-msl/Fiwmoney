resilience4j.circuitbreaker.instances.searchStockApi.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.searchStockApi.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.searchStockApi.minimum-number-of-calls=3
management.endpoints.web.exposure.include=health,circuitbreakers,circuitbreakerevents
